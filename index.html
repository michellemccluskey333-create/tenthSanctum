<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Tenth Sanctum Tattoo</title>

  <style>
    :root {
      --bg: #000;
      --header-h: 120px;
      --ease: cubic-bezier(.22, .61, .36, 1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      overflow-x: hidden;
    }

    body.intro-running {
      overflow: hidden;
    }

    img {
      display: block;
      max-width: 100%;
    }

    /* =========================
       INTRO LOGO SCREEN
    ========================== */

    .intro {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: #000;
      pointer-events: none;
      opacity: 1;
      transition: opacity 0.7s ease;
    }

    .intro-logo {
      position: absolute;
      top: 50%;
      left: 50%;
      width: min(76vw, 800px);
      transform: translate(-50%, -50%);
      opacity: 1;
      filter:
        drop-shadow(0 0 12px rgba(182, 37, 29, 0.26))
        drop-shadow(0 0 32px rgba(182, 37, 29, 0.14));
      transition:
        opacity 0.75s ease,
        transform 0.75s var(--ease);
    }

    body.logo-fade .intro-logo {
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.96);
    }

    body.intro-complete .intro {
      opacity: 0;
    }

    /* =========================
       TOP LOGO
    ========================== */

    .site-header {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 300;
      width: 100%;
      height: var(--header-h);
      padding: 24px 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.86),
        rgba(0,0,0,0.28),
        rgba(0,0,0,0)
      );
      opacity: 0;
      transform: translateY(-10px);
      transition:
        opacity 0.9s ease,
        transform 0.9s var(--ease);
    }

    body.header-live .site-header {
      opacity: 1;
      transform: translateY(0);
    }

    .header-logo {
      width: min(42vw, 440px);
      filter:
        drop-shadow(0 0 9px rgba(182, 37, 29, 0.18))
        drop-shadow(0 0 22px rgba(182, 37, 29, 0.1));
    }

    /* =========================
       HERO IMAGE
    ========================== */

    .hero {
      position: relative;
      min-height: 100vh;
      background: #000;
      overflow: hidden;
    }

    .hero-media {
      position: absolute;
      inset: 0;
      opacity: 0;
      transform: scale(1.025);
      filter: brightness(0.08) contrast(1.08) saturate(0.45);
      transition:
        opacity 1.1s ease,
        transform 1.5s var(--ease),
        filter 1.8s ease;
    }

    body.hero-live .hero-media {
      opacity: 1;
      transform: scale(1);
    }

    body.hero-bright .hero-media {
      filter: brightness(0.72) contrast(1.06) saturate(0.72);
    }

    .hero-media::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 2;
      background:
        linear-gradient(
          to bottom,
          rgba(0,0,0,0.82) 0%,
          rgba(0,0,0,0.22) 32%,
          rgba(0,0,0,0.18) 62%,
          rgba(0,0,0,0.86) 100%
        ),
        linear-gradient(
          to right,
          rgba(0,0,0,0.46) 0%,
          rgba(0,0,0,0.12) 38%,
          rgba(0,0,0,0.12) 70%,
          rgba(0,0,0,0.44) 100%
        );
      pointer-events: none;
    }

    .hero-img {
      position: absolute;
      inset: 0;
      z-index: 1;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
    }

    /* =========================
       RESPONSIVE
    ========================== */

    @media (max-width: 900px) {
      :root {
        --header-h: 110px;
      }

      .header-logo {
        width: min(58vw, 340px);
      }

      .intro-logo {
        width: min(84vw, 620px);
      }
    }

    @media (max-width: 600px) {
      :root {
        --header-h: 96px;
      }

      .site-header {
        padding: 18px 22px;
      }

      .header-logo {
        width: min(72vw, 290px);
      }

      .intro-logo {
        width: min(86vw, 480px);
      }

      .hero-img {
        object-position: center center;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        transition: none !important;
        animation: none !important;
      }

      body {
        overflow: auto !important;
      }

      .intro {
        display: none;
      }

      .site-header,
      .hero-media {
        opacity: 1 !important;
        transform: none !important;
      }

      .hero-media {
        filter: brightness(0.72) contrast(1.06) saturate(0.72) !important;
      }
    }
  </style>
</head>

<body class="intro-running">
  <!-- Large opening logo -->
  <div class="intro" aria-hidden="true">
    <img src="Images/logo.PNG" alt="" class="intro-logo" />
  </div>

  <!-- Final top logo -->
  <header class="site-header" aria-label="Tenth Sanctum logo">
    <img src="Images/logo.PNG" alt="Tenth Sanctum Tattoo" class="header-logo" />
  </header>

  <!-- Hero image -->
  <main>
    <section class="hero" aria-label="Tenth Sanctum Tattoo hero image">
      <div class="hero-media" aria-hidden="true">
        <img src="Images/hero-image.jpeg" alt="" class="hero-img" />
      </div>
    </section>
  </main>

  <script>
    const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    if (reduceMotion) {
      document.body.classList.remove("intro-running");
      document.body.classList.add(
        "logo-fade",
        "hero-live",
        "hero-bright",
        "header-live",
        "intro-complete"
      );
    } else {
      window.addEventListener("load", () => {
        // 1. Black screen + large centered logo is already visible.

        // 2. Fade out the large logo.
        setTimeout(() => {
          document.body.classList.add("logo-fade");
        }, 900);

        // 3. Bring in the hero image, very dark at first.
        setTimeout(() => {
          document.body.classList.add("hero-live");
        }, 1450);

        // 4. Brighten the hero image.
        setTimeout(() => {
          document.body.classList.add("hero-bright");
        }, 1850);

        // 5. Fade in the smaller top logo.
        setTimeout(() => {
          document.body.classList.add("header-live");
          document.body.classList.remove("intro-running");
        }, 2350);

        // 6. Fade away the black intro overlay.
        setTimeout(() => {
          document.body.classList.add("intro-complete");
        }, 2600);

        // 7. Remove the intro layer entirely.
        setTimeout(() => {
          const intro = document.querySelector(".intro");
          if (intro) intro.remove();
        }, 3400);
      });
    }
  </script>
</body>
</html>
