<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Tenth Sanctum Tattoo</title>

  <style>
    :root {
      --bg: #000;
      --line: rgba(232, 222, 206, 0.12);
      --header-h: 108px;
      --ease: cubic-bezier(.22, .61, .36, 1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      overflow-x: hidden;
    }

    body.intro-running {
      overflow: hidden;
    }

    img {
      display: block;
      max-width: 100%;
    }

    .intro {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: #000;
      pointer-events: none;
      opacity: 1;
    }

    .intro-logo {
      position: absolute;
      top: 50%;
      left: 50%;
      width: min(76vw, 800px);
      transform: translate(-50%, -50%);
      transform-origin: center center;
      opacity: 1;
      filter:
        drop-shadow(0 0 12px rgba(182, 37, 29, 0.26))
        drop-shadow(0 0 32px rgba(182, 37, 29, 0.14));
      transition:
        top 1.05s var(--ease),
        width 1.05s var(--ease),
        transform 1.05s var(--ease),
        opacity 0.35s ease;
    }

    body.logo-settling .intro-logo {
      top: 27px;
      width: min(42vw, 440px);
      transform: translate(-50%, 0);
    }

    body.intro-complete .intro {
      opacity: 0;
      transition: opacity 0.45s ease;
    }

    .site-header {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 300;
      width: 100%;
      height: var(--header-h);
      padding: 22px 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.92),
        rgba(0,0,0,0.38),
        rgba(0,0,0,0)
      );
      opacity: 0;
      transition: opacity 0.45s ease;
    }

    body.content-live .site-header {
      opacity: 1;
    }

    .header-logo {
      width: min(42vw, 440px);
      filter:
        drop-shadow(0 0 9px rgba(182, 37, 29, 0.18))
        drop-shadow(0 0 22px rgba(182, 37, 29, 0.1));
    }

    .hero {
      position: relative;
      min-height: 100vh;
      background: #000;
      overflow: hidden;
    }

    .hero-media {
      position: absolute;
      inset: 0;
      opacity: 0;
      transform: scale(1.025);
      transition:
        opacity 1.1s ease,
        transform 1.4s var(--ease),
        filter 1.4s ease;
      filter: brightness(0.12) contrast(1.08) saturate(0.45);
    }

    body.hero-live .hero-media {
      opacity: 1;
      transform: scale(1);
    }

    body.hero-bright .hero-media {
      filter: brightness(0.72) contrast(1.06) saturate(0.72);
    }

    .hero-media::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 2;
      background:
        linear-gradient(
          to bottom,
          rgba(0,0,0,0.86) 0%,
          rgba(0,0,0,0.26) 30%,
          rgba(0,0,0,0.22) 60%,
          rgba(0,0,0,0.88) 100%
        ),
        linear-gradient(
          to right,
          rgba(0,0,0,0.62) 0%,
          rgba(0,0,0,0.18) 40%,
          rgba(0,0,0,0.18) 70%,
          rgba(0,0,0,0.58) 100%
        );
    }

    .hero-img {
      position: absolute;
      inset: 0;
      z-index: 1;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
    }

    @media (max-width: 1050px) {
      :root {
        --header-h: 138px;
      }

      .site-header {
        padding: 18px 24px;
      }

      .header-logo,
      body.logo-settling .intro-logo {
        width: min(54vw, 340px);
      }
    }

@media (max-width: 640px) {
  :root {
    --header-h: 96px;
  }

  .site-header {
    height: var(--header-h);
    padding: 18px 22px;
  }

  .intro-logo {
    width: min(86vw, 480px);
  }

  .header-logo {
    width: min(62vw, 250px);
  }

  .hero-img {
    object-fit: cover;
    object-position: center center;
  }

  .hero-media {
    filter: brightness(0.08) contrast(1.08) saturate(0.45);
  }

  body.hero-bright .hero-media {
    filter: brightness(0.72) contrast(1.06) saturate(0.72);
  }
}

  </style>
</head>

<body class="intro-running">
  <div class="intro" aria-hidden="true">
    <img src="Images/logo.PNG" alt="" class="intro-logo" />
  </div>

  <header class="site-header">
    <img src="Images/logo.PNG" alt="Tenth Sanctum Tattoo" class="header-logo" />
  </header>

  <main>
    <section class="hero">
      <div class="hero-media" aria-hidden="true">
        <img src="Images/hero-image.jpeg" alt="" class="hero-img" />
      </div>
    </section>
  </main>

<script>
  window.addEventListener("load", () => {
    // 1. Black screen + large centered logo is already visible.

    // 2. Logo moves/shrinks to top center.
    setTimeout(() => {
      document.body.classList.add("logo-settling");
    }, 650);

    // 3. Hero image appears, still very dark/blackened.
    setTimeout(() => {
      document.body.classList.add("hero-live");
    }, 1650);

    // 4. Hero image brightens into visibility.
    setTimeout(() => {
      document.body.classList.add("hero-bright");
    }, 2050);

    // 5. Header/logo becomes visible.
    setTimeout(() => {
      document.body.classList.add("content-live");
      document.body.classList.remove("intro-running");
    }, 2600);

    // 6. Fade away black intro layer.
    setTimeout(() => {
      document.body.classList.add("intro-complete");
    }, 2850);

    // 7. Remove intro layer.
    setTimeout(() => {
      const intro = document.querySelector(".intro");
      if (intro) intro.remove();
    }, 3350);
  });
</script>
</body>
</html>
