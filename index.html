<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Tenth Sanctum Tattoo</title>

  <!-- Google Font: Cormorant Garamond -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&display=swap" rel="stylesheet">

  <style>
    /* =========================
       GLOBAL VARIABLES
       One unified color system for the whole page.
    ========================== */
    :root {
      --bg: #000;
      --cream: #e8dece;
      --muted: #c7b8a1;

      /* Unified muted red system */
      --red: #d85b4f;
      --red-dark: #8f211c;
      --red-soft: rgba(216, 91, 79, 0.16);
      --red-border: rgba(216, 91, 79, 0.72);
      --red-glow: rgba(216, 91, 79, 0.32);

      --line: rgba(232, 222, 206, 0.12);
      --ease: cubic-bezier(.22, .61, .36, 1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      overflow-x: hidden;
    }

    body.intro-running {
      overflow: hidden;
    }

    img {
      display: block;
      max-width: 100%;
    }

    a {
      color: inherit;
    }

    /* =========================
       BLACKOUT INTRO LAYER
       Creates the black screen on load.
    ========================== */
    .blackout {
      position: fixed;
      inset: 0;
      z-index: 900;
      background: #000;
      opacity: 1;
      pointer-events: none;
      transition: opacity 0.9s ease;
    }

    body.hero-live .blackout {
      opacity: 0;
    }

    /* =========================
       SINGLE ANIMATED MAIN LOGO
       Starts large/centered, then settles large at the top.
    ========================== */
    .site-logo {
      position: fixed;
      z-index: 1000;
      top: 50%;
      left: 50%;
      width: min(76vw, 800px);
      transform: translate(-50%, -50%);
      transform-origin: center center;
      filter:
        drop-shadow(0 0 12px rgba(216, 91, 79, 0.26))
        drop-shadow(0 0 32px rgba(216, 91, 79, 0.14));
      transition:
        top 1.05s var(--ease),
        width 1.05s var(--ease),
        transform 1.05s var(--ease);
    }

    /* Restored larger settled logo */
    body.logo-settling .site-logo {
      top: 22px;
      width: min(56vw, 680px);
      transform: translate(-50%, 0);
    }

    /* =========================
       HAMBURGER MENU BUTTON
    ========================== */
    .menu-toggle {
      position: fixed;
      top: 28px;
      left: 32px;
      z-index: 1100;
      width: 44px;
      height: 36px;
      border: 1px solid rgba(232, 222, 206, 0.28);
      background: rgba(0, 0, 0, 0.18);
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition:
        opacity 0.7s ease,
        border-color 0.2s ease,
        background 0.2s ease,
        box-shadow 0.2s ease;
    }

    body.nav-live .menu-toggle {
      opacity: 1;
      pointer-events: auto;
    }

    .menu-toggle:hover {
      border-color: var(--red-border);
      background: var(--red-soft);
      box-shadow: 0 0 12px rgba(216, 91, 79, 0.12);
    }

    .menu-toggle span {
      display: block;
      width: 24px;
      height: 1px;
      margin: 6px auto;
      background: var(--cream);
      transition: transform 0.25s ease, opacity 0.25s ease;
    }

    body.menu-open .menu-toggle span:nth-child(1) {
      transform: translateY(7px) rotate(45deg);
    }

    body.menu-open .menu-toggle span:nth-child(2) {
      opacity: 0;
    }

    body.menu-open .menu-toggle span:nth-child(3) {
      transform: translateY(-7px) rotate(-45deg);
    }

    /* =========================
       TOP RIGHT BOOK BUTTON
    ========================== */
    .book-top {
      position: fixed;
      top: 28px;
      right: 32px;
      z-index: 1100;
      padding: 13px 22px;
      border: 1px solid var(--red-border);
      color: var(--cream);
      background: rgba(0, 0, 0, 0.24);
      font-family: Arial, sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-decoration: none;
      opacity: 0;
      pointer-events: none;
      box-shadow:
        inset 0 0 10px rgba(216, 91, 79, 0.06),
        0 0 12px rgba(216, 91, 79, 0.08);
      transition:
        opacity 0.7s ease,
        background 0.2s ease,
        color 0.2s ease,
        border-color 0.2s ease,
        box-shadow 0.2s ease;
    }

    body.nav-live .book-top {
      opacity: 1;
      pointer-events: auto;
    }

    .book-top:hover {
      background: var(--red-soft);
      color: #fff;
      border-color: var(--red);
      box-shadow:
        0 0 8px var(--red-glow),
        0 0 22px rgba(216, 91, 79, 0.14),
        inset 0 0 12px rgba(216, 91, 79, 0.08);
    }

    /* =========================
       PULL-DOWN MENU
    ========================== */
    .pull-menu {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 1050;
      width: min(310px, 86vw);
      height: 100vh;
      padding: 88px 34px 34px;
      background:
        linear-gradient(to bottom, rgba(0,0,0,0.98), rgba(8,8,8,0.96)),
        #000;
      border-right: 1px solid var(--line);
      transform: translateX(-100%);
      transition: transform 0.45s var(--ease);
    }

    body.menu-open .pull-menu {
      transform: translateX(0);
    }

    /* Keeps the drawer content compact instead of pushing the emblem too low */
    .menu-content {
      min-height: 100%;
      display: flex;
      flex-direction: column;
    }

    .pull-menu-links {
      display: flex;
      flex-direction: column;
      gap: 26px;
    }

    .pull-menu a {
      position: relative;
      width: fit-content;
      color: var(--cream);
      font-family: Arial, sans-serif;
      font-size: 0.82rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-decoration: none;
      padding-bottom: 8px;
    }

    .pull-menu a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: 0;
      width: 0;
      height: 1px;
      background: var(--red);
      box-shadow:
        0 0 6px var(--red-glow),
        0 0 14px rgba(216, 91, 79, 0.18);
      transition: width 0.22s ease;
    }

    .pull-menu a:hover::after {
      width: 100%;
    }

    .pull-menu a:hover {
      color: #fff;
      text-shadow:
        0 0 6px rgba(216, 91, 79, 0.35),
        0 0 14px rgba(216, 91, 79, 0.16);
    }

    /* Pull-down Book Now button */
    .pull-menu .menu-book-btn {
      margin-top: 8px;
      width: 100%;
      max-width: 220px;
      padding: 13px 18px;
      border: 1px solid var(--red-border);
      color: var(--cream);
      text-align: center;
      background: rgba(216, 91, 79, 0.07);
      box-shadow:
        inset 0 0 10px rgba(216, 91, 79, 0.06),
        0 0 14px rgba(216, 91, 79, 0.08);
    }

    .pull-menu .menu-book-btn::after {
      display: none;
    }

    .pull-menu .menu-book-btn:hover {
      color: #fff;
      background: var(--red-soft);
      border-color: var(--red);
      box-shadow:
        0 0 8px var(--red-glow),
        0 0 22px rgba(216, 91, 79, 0.14),
        inset 0 0 12px rgba(216, 91, 79, 0.08);
    }

    /* Note, not a menu choice */
    .no-piercer-note {
  margin: 46px 0 0;
  padding-top: 18px;
  border-top: 1px solid var(--red-border);
  color: var(--red);
  font-family: Arial, sans-serif;
  font-size: 0.82rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  text-shadow:
    0 0 5px rgba(216, 91, 79, 0.35),
    0 0 12px rgba(216, 91, 79, 0.14);
}

    /* Emblem sits below the note, not stranded at the bottom */
    .menu-logo-small {
      width: 150px;
      margin: 72px auto 0;
      opacity: 0.9;
      filter:
        drop-shadow(0 0 8px rgba(216, 91, 79, 0.22))
        drop-shadow(0 0 18px rgba(216, 91, 79, 0.12));
    }

    .menu-backdrop {
      position: fixed;
      inset: 0;
      z-index: 1040;
      background: rgba(0, 0, 0, 0.5);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    body.menu-open .menu-backdrop {
      opacity: 1;
      pointer-events: auto;
    }

    /* =========================
       HERO IMAGE
    ========================== */
    .hero {
      position: relative;
      min-height: 100vh;
      background: #000;
      overflow: hidden;
    }

    .hero-media {
      position: absolute;
      inset: 0;
      opacity: 0;
      transform: scale(1.025);
      transition:
        opacity 1.1s ease,
        transform 1.4s var(--ease),
        filter 1.4s ease;
      filter: brightness(0.12) contrast(1.08) saturate(0.45);
    }

    body.hero-live .hero-media {
      opacity: 1;
      transform: scale(1);
    }

    body.hero-bright .hero-media {
      filter: brightness(0.72) contrast(1.06) saturate(0.72);
    }

    .hero-media::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 2;
      background:
        linear-gradient(
          to bottom,
          rgba(0,0,0,0.82) 0%,
          rgba(0,0,0,0.22) 34%,
          rgba(0,0,0,0.18) 64%,
          rgba(0,0,0,0.86) 100%
        ),
        linear-gradient(
          to right,
          rgba(0,0,0,0.68) 0%,
          rgba(0,0,0,0.36) 32%,
          rgba(0,0,0,0.14) 72%,
          rgba(0,0,0,0.42) 100%
        );
      pointer-events: none;
    }

    .hero-img {
      position: absolute;
      inset: 0;
      z-index: 1;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
    }

    /* =========================
       HERO TEXT
       Font stays as-is. Only Walk-Ins sizing is restored.
    ========================== */
    .hero-text {
      position: absolute;
      left: 56px;
      bottom: 150px;
      z-index: 20;
      max-width: 520px;
      color: var(--cream);
      opacity: 0;
      transform: translateY(14px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }

    body.nav-live .hero-text {
      opacity: 1;
      transform: translateY(0);
    }

    .hero-text h1 {
      margin: 0 0 18px;
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(2.8rem, 5.2vw, 5rem);
      line-height: 1.02;
      font-weight: 600;
      color: var(--cream);
      letter-spacing: 0.01em;
    }

    .hero-text .walkins {
      display: inline-block;
      margin: 4px 0 0;
      padding: 8px 0 0;
      border-top: 1px solid var(--red-border);
      font-family: Arial, sans-serif;
      font-size: 0.95rem;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--red);
      text-shadow:
        0 0 5px rgba(216, 91, 79, 0.35),
        0 0 12px rgba(216, 91, 79, 0.14);
    }

    /* =========================
       TABLET
    ========================== */
    @media (max-width: 1050px) {
      .site-logo {
        width: min(78vw, 620px);
      }

      body.logo-settling .site-logo {
        top: 22px;
        width: min(62vw, 460px);
        transform: translate(-50%, 0);
      }

      .hero-text {
        max-width: 560px;
      }
    }

    /* =========================
       MOBILE
    ========================== */
    @media (max-width: 640px) {
      .site-logo {
        width: min(84vw, 520px);
      }

      body.logo-settling .site-logo {
        top: 18px;
        width: min(68vw, 330px);
        transform: translate(-50%, 0);
      }

      .menu-toggle {
        top: 22px;
        left: 18px;
      }

      .book-top {
        top: 22px;
        right: 18px;
        padding: 9px 12px;
        font-size: 0.62rem;
        letter-spacing: 0.12em;
      }

      .pull-menu {
        width: 86vw;
        padding: 88px 28px 30px;
      }

      .menu-logo-small {
        width: 125px;
        margin-top: 58px;
      }

      .hero-img {
        object-fit: cover;
        object-position: center center;
      }

      .hero-media {
        filter: brightness(0.08) contrast(1.08) saturate(0.45);
      }

      body.hero-bright .hero-media {
        filter: brightness(0.72) contrast(1.06) saturate(0.72);
      }

      .hero-text {
        left: 24px;
        right: 24px;
        bottom: 90px;
        max-width: none;
        text-align: left;
      }

    .hero-text h1 {
  font-size: clamp(2.1rem, 9.5vw, 3.15rem);
  line-height: 1.05;
}

      .hero-text .walkins {
        font-size: 0.78rem;
        letter-spacing: 0.18em;
      }
    }
  </style>
</head>

<body class="intro-running">
  <!-- Black overlay for intro animation -->
  <div class="blackout" aria-hidden="true"></div>

  <!-- Single animated main logo -->
  <img src="Images/logo.PNG" alt="Tenth Sanctum Tattoo" class="site-logo" />

  <!-- Hamburger menu button -->
  <button class="menu-toggle" type="button" aria-label="Open menu" aria-expanded="false">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <!-- Top-right Book Now button -->
  <a href="#book" class="book-top">Book Now</a>

  <!-- Menu backdrop -->
  <div class="menu-backdrop" aria-hidden="true"></div>

  <!-- Pull-down menu -->
  <nav class="pull-menu" aria-label="Main navigation">
    <div class="menu-content">
      <div>
        <div class="pull-menu-links">
          <a href="#about">About</a>
          <a href="#tattooers">Tattooers</a>
          <a href="#faqs">FAQs</a>
          <a href="#book" class="menu-book-btn">Book Now</a>
        </div>

        <p class="no-piercer-note">No piercing services</p>

        <!-- Bottom emblem. Make sure this file exists exactly as written. -->
        <img src="Images/emblem.png" alt="Tenth Sanctum emblem" class="menu-logo-small" />
      </div>
    </div>
  </nav>

  <!-- Hero section -->
  <main>
    <section class="hero">
      <!-- Hero image -->
      <div class="hero-media" aria-hidden="true">
        <img src="Images/hero-image.jpeg" alt="" class="hero-img" />
      </div>

      <!-- Hero text on the image -->
      <div class="hero-text">
        <h1>Custom Tattooing in<br>Omaha’s Old Market</h1>
        <p class="walkins">Walk-Ins Welcome</p>
      </div>
    </section>
  </main>

  <script>
    /* =========================
       INTRO ANIMATION TIMING
    ========================== */
    window.addEventListener("load", () => {
      // Move logo from center to top.
      setTimeout(() => {
        document.body.classList.add("logo-settling");
      }, 650);

      // Reveal hero image, still dark.
      setTimeout(() => {
        document.body.classList.add("hero-live");
      }, 1650);

      // Brighten hero image.
      setTimeout(() => {
        document.body.classList.add("hero-bright");
      }, 2050);

      // Reveal menu, CTA, and hero text.
      setTimeout(() => {
        document.body.classList.add("nav-live");
        document.body.classList.remove("intro-running");
      }, 2600);

      // Remove blackout layer after animation.
      setTimeout(() => {
        const blackout = document.querySelector(".blackout");
        if (blackout) blackout.remove();
      }, 3100);
    });

    /* =========================
       PULL-DOWN MENU CONTROLS
    ========================== */
    const menuToggle = document.querySelector(".menu-toggle");
    const menuBackdrop = document.querySelector(".menu-backdrop");
    const menuLinks = document.querySelectorAll(".pull-menu a");

    function closeMenu() {
      document.body.classList.remove("menu-open");
      menuToggle.setAttribute("aria-expanded", "false");
    }

    menuToggle.addEventListener("click", () => {
      const isOpen = document.body.classList.toggle("menu-open");
      menuToggle.setAttribute("aria-expanded", isOpen ? "true" : "false");
    });

    menuBackdrop.addEventListener("click", closeMenu);

    menuLinks.forEach((link) => {
      link.addEventListener("click", closeMenu);
    });
  </script>
</body>
</html>
