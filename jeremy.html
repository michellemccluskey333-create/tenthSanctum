<body>
  <header class="artist-header">

        <div class="artist-contact">
          <h2>Book with Jeremy</h2>

          <a href="mailto:Fierto@outlook.com " class="artist-button">

          </a>

          <a href="https://www.instagram.com/fierto402/" target="_blank" rel="noopener" class="artist-button secondary">
            Instagram
          </a>

    <section class="artist-gallery-section">

      <div class="artist-gallery">
        <img src="Images/artists/jeremy/gallery-1.png" alt="Tattoo by Jeremy" />
