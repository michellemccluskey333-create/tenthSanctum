<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Alex | Tenth Sanctum Tattoo</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="artist.css" />
</head>

<body>
  <header class="artist-header">
    <a href="index.html" class="back-link">← Back to Tenth Sanctum</a>
    <img src="Images/logo.PNG" alt="Tenth Sanctum Tattoo" class="artist-logo" />
  </header>

  <main>
    <section class="artist-profile">
      <div class="artist-photo-wrap">
        <img src="Images/artists/alex-profile.png" alt="Alex" class="artist-profile-photo" />
      </div>

      <div class="artist-profile-copy">
        <p class="section-kicker">Tattooer</p>
        <h1>Alex</h1>
        <p class="artist-handle">@fierto402</p>

        <p class="artist-bio">
          Add Alex’s short bio here. Mention tattoo style, years tattooing, preferred subject matter,
          booking preferences, or anything that helps clients understand his work.
        </p>

        <div class="artist-contact">
          <h2>Book with Alex</h2>

          <a href="mailto:adowningtattoos@gmail.com" class="artist-button">
            Email Alex
          </a>

          <a href="https://www.instagram.com/alex.downing/" target="_blank" rel="noopener" class="artist-button secondary">
            Instagram
          </a>
        </div>
      </div>
    </section>

    <section class="artist-gallery-section">
      <p class="section-kicker">Portfolio</p>
      <h2>Selected Work</h2>

      <div class="artist-gallery">
        <img src="Images/artists/alex/gallery-1.png" alt="Tattoo by Alex" />
        <img src="Images/artists/alex/gallery-2.png" alt="Tattoo by Alex" />
        <img src="Images/artists/alex/gallery-3.png" alt="Tattoo by Alex" />
        <img src="Images/artists/alex/gallery-4.png" alt="Tattoo by Alex" />
        <img src="Images/artists/alex/gallery-5.png" alt="Tattoo by Alex" />
        <img src="Images/artists/alex/gallery-6.png" alt="Tattoo by Alex" />
      </div>
    </section>
  </main>
</body>
</html>
